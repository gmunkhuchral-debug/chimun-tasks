<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Чимун ХХК · корпорат лого
       Кирил "Ч" монограм + индиго-нил гүн градиент.
       Эх компани (NOMAAD + M Event дээгүүр) тул нэгдсэн ноён ноорог өнгө аяс. -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5e6ad2"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="white">
    <!-- Зүүн босоо (дээрээс тэнхлэг хүртэл) -->
    <rect x="140" y="128" width="56" height="120" rx="4"/>
    <!-- Баруун босоо (бүх өндрийн дагуу) -->
    <rect x="316" y="128" width="56" height="256" rx="4"/>
    <!-- Хөндлөн тэнхлэг (Ч-ийн дунд) -->
    <rect x="140" y="232" width="232" height="56" rx="4"/>
  </g>
</svg>
